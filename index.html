<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mental Math 02</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="app">
      <!-- 연산 선택 화면 -->
      <div id="menu" class="screen">
        <h1>암산 퀴즈</h1>
        <form id="menuForm">
          <div class="form-group">
            <label for="mode">문항 유형:</label>
            <select id="mode" name="mode"></select>
          </div>
          <div class="form-group">
            <label for="total">문항 수:</label>
            <input type="number" id="total" name="total" min="1" value="5" />
          </div>
          <div class="form-group">
            <label for="accuracy">정확도:</label>
            <select id="accuracy" name="accuracy"></select>
          </div>
          <div class="form-group">
            <label for="detail">인수:</label>
            <input type="text" id="detail" name="detail" required />
          </div>
          <button type="submit">시작</button>
        </form>
      </div>

      <!-- 퀴즈 화면 -->
      <div id="quiz" class="screen hidden">
        <div id="display">
          <h2 id="problem"></h2>
          <input id="answer" readonly />
        </div>
        <div id="keypad">
          <button data-action="allClear">AC</button>
          <button data-action="backspace">←</button>
          <button data-value="7">7</button>
          <button data-value="8">8</button>
          <button data-value="9">9</button>
          <button data-value="4">4</button>
          <button data-value="5">5</button>
          <button data-value="6">6</button>
          <button data-value="1">1</button>
          <button data-value="2">2</button>
          <button data-value="3">3</button>
          <button data-value="0">0</button>
          <button data-value=".">.</button>
          <span id="submit-group">
            <button data-action="submit" id="submitAns">✓</button>
            <button
              data-action="wrongNext"
              id="wrongNext"
              style="display: none"
            >
              ➔
            </button>
          </span>
        </div>
      </div>

      <!-- 결과 화면 -->
      <div id="result" class="screen hidden">
        <input type="text" id="score" />
        <button id="goMenu">메뉴로</button>
        <button id="reQuiz">다시</button>
      </div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
